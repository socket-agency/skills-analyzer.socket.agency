# Secret material embedded in an artifact (Secret Exposure). Conservative, high
# confidence patterns only — these forms are not legitimate documentation content.

- id: secret.private_key
  category: secret_exposure
  severity: high
  confidence: high
  language: en
  description: A private key block is embedded in the artifact.
  remediation: Remove the private key; never ship credentials in an artifact.
  surfaces: [body, reference, script]
  kinds: [any]
  patterns:
    - "-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----"

- id: secret.aws_access_key
  category: secret_exposure
  severity: high
  confidence: high
  language: en
  description: An AWS access key id is embedded in the artifact.
  remediation: Revoke the key and remove it from the artifact.
  surfaces: [body, reference, script]
  kinds: [any]
  patterns:
    - "AKIA[0-9A-Z]{16}"

- id: secret.generic_token_assignment
  category: secret_exposure
  severity: medium
  confidence: low
  language: en
  description: A high-entropy token appears assigned to a secret-like variable.
  remediation: Move secrets to environment variables or a secret manager.
  surfaces: [script]
  kinds: [any]
  patterns:
    - "(?i)(api[_-]?key|secret|token|password|passwd)['\"]?\\s*[:=]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
